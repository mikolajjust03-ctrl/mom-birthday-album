<!DOCTYPE html>
<html lang="pl">

<body>

    <!-- UP (parents) -->
    <section class="section up">
        <h2>Agnieszka i Wojtek</h2>
        <div class="grid">
            <img src="images/rodzice1.jpeg">
            <img src="images/rodzice2_tytul.jpeg">

            <img src="images/rodzice_slub_radka2.jpeg">

    <!-- DOWN (home + dog) -->

        <div class="grid">
            <img src="images/szenzol5.jpeg">
            <img src="images/szenzol6.jpeg">
            <img src="images/szenzol_tata.jpeg">
            <img src="images/szenzol_wcisniety.jpeg">
            <img src="images/piciu.jpeg">

        <h2>Narty</h2>
        <div class="grid">
            <img src="images/narty_trio.jpeg">

            <img src="images/narty_mama_cyc.jpeg">
            <img src="images/narty_tata_cyc.jpeg">
        </div>
    </section>

    <!-- RIGHT (summer / travel) -->
    <section class="section right">
        <h2>Podróże</h2>
        <div class="grid">
            <img src="images/safari1.jpeg">
            <img src="images/safari2.jpeg">
            <img src="images/rome1.jpeg">
            <img src="images/rome2.jpeg">
            <img src="images/haga_plaza.jpeg">
        </div>

</div>

<script src="script.js"></script>

</html>
